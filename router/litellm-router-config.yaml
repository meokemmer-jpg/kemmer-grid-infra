# LiteLLM Router Config fuer Kemmer-Grid [CRUX-MK] Layer 0
# 4-Tier-LLM-Routing mit Criticality-Budgeting (nicht Token-Cap)
# Claude-Opus strikt als Arbitration (K_0/Q_0/Phronesis)
# Lokale Modelle (Mac) fuer Routine
#
# CRUX-MK Layer-0-Verankerung:
# - Jeder Call geht durch scripts/crux-precall-hook.py (callbacks unten)
# - criticality_score wird berechnet aus task-metadata.tags
# - rho-Impact wird geloggt in ~/.kemmer-grid/rho-tracking.jsonl
# - Kill-Switch-Check vor jedem Call (verhindert Cost-Explosion)

crux_mk: true
crux_version: "v1.0"
crux_impact:
  rho_estimate_eur_per_year: "+5000-20000 (Router entlastet direkte Opus-Calls, Criticality-Budgeting verhindert Fehl-Routing)"
  k0_protection: "high (Opus-Route erzwungen bei K_0-Tags >= 0.7 score)"
  q0_protection: "high (Q_0/Phronesis-Tags erzwingen Premium-Arbitration)"
  i_min_contribution: "positive (zentraler Router statt ad-hoc Tool-Calls)"
  wargame_status: "alignment_passed (Masterplan v2 Patch P6)"

# CRUX-Pre-Call-Hook Integration (Layer 0)
callbacks:
  pre_call:
    - scripts/crux-precall-hook.py:crux_pre_call
  failure_callback:
    - scripts/crux-precall-hook.py:log_call


model_list:
  # ========== TIER 2: Premium Arbitration ==========
  - model_name: claude-opus-4.7
    litellm_params:
      model: claude-opus-4.7
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      tier: premium
      criticality_min: 0.5
      use_cases: ["K_0-decisions", "Q_0-phronesis", "rule-design", "cross-llm-arbitration", "k0-risk-review"]
      cost_per_1m_tokens_input: 15.0
      cost_per_1m_tokens_output: 75.0
      per_account_rate_limited: true
      rate_limit_warning: "Per-account limit - mehrere Machines teilen gleiche Quota"

  - model_name: claude-sonnet-4
    litellm_params:
      model: claude-sonnet-4
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      tier: mid-cloud
      criticality_min: 0.3
      use_cases: ["complex-reasoning", "multi-step-plan", "code-review-deep"]
      cost_per_1m_tokens_input: 3.0
      cost_per_1m_tokens_output: 15.0

  # ========== TIER 1: Commodity Cloud Workers ==========
  - model_name: codex-gpt5.4
    litellm_params:
      model: openai/gpt-5.4
      api_base: http://localhost:5001/codex  # via codex-mcp bridge
      api_key: os.environ/OPENAI_API_KEY
    model_info:
      tier: commodity-cloud
      use_cases: ["task-decomposition", "deep-reasoning", "code-gen-complex", "cross-llm-synthesis"]
      flat_subscription: "ChatGPT Pro"
      cost_marginal_eur: 0

  - model_name: gemini-2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY
    model_info:
      tier: commodity-cloud
      use_cases: ["long-context", "repo-digestion", "multimodal", "holistische-synapse"]
      flat_subscription: "Gemini Ultra"
      context_window: 1000000
      cost_marginal_eur: 0

  - model_name: grok-4.20-reasoning
    litellm_params:
      model: xai/grok-4.20-0309-reasoning
      api_key: os.environ/XAI_API_KEY
    model_info:
      tier: commodity-cloud
      use_cases: ["adversarial-red-team", "x-search", "first-principles-challenge", "anti-sycophancy"]
      flat_subscription: "SuperGrok Heavy"
      cost_marginal_eur: 0

  - model_name: grok-4.20-multi-agent
    litellm_params:
      model: xai/grok-4.20-multi-agent-0309
      api_key: os.environ/XAI_API_KEY
    model_info:
      tier: commodity-cloud-special
      use_cases: ["multi-agent-deep-research", "4-or-16-agent-parallel"]
      special: "Exklusives SuperGrok-Heavy-Feature"

  - model_name: copilot-pro
    litellm_params:
      model: custom/copilot-cli
      api_base: http://localhost:5002/copilot  # via copilot-cli bridge
    model_info:
      tier: commodity-cloud
      use_cases: ["bulk-code", "boilerplate", "github-api-tasks", "docs-gen"]
      flat_subscription: "GitHub Copilot Pro+"
      monthly_request_budget: 1500
      cost_marginal_eur: 0

  # ========== TIER 3: Local Inference (Mac Phase 3) ==========
  - model_name: gemma2-27b-local
    litellm_params:
      model: ollama/gemma2:27b
      api_base: http://MAC_LAN_IP:11434  # Wird dynamisch aus grid-endpoints.json ersetzt
    model_info:
      tier: local-inference
      use_cases: ["routine-code", "docs-drafts", "classification", "routing-decisions", "nightly-triage", "embedding-prep"]
      cost_per_call: 0
      latency_seconds_expected: 1-5
      availability: "Mac M5 Max (Phase 3 only)"
      fallback_on_unreachable: "gemini-2.5-pro"

  - model_name: llama3.3-70b-local
    litellm_params:
      model: ollama/llama3.3:70b-instruct-q4_K_M
      api_base: http://MAC_LAN_IP:11434
    model_info:
      tier: local-inference
      use_cases: ["complex-routine", "long-context-summary"]
      cost_per_call: 0
      optional: true

  - model_name: mxbai-embed-local
    litellm_params:
      model: ollama/mxbai-embed-large
      api_base: http://MAC_LAN_IP:11434
    model_info:
      tier: local-inference
      use_cases: ["embedding", "rag-vector-generation"]
      cost_per_call: 0

# ========== ROUTER SETTINGS ==========
# LiteLLM-Router kennt nur Standard-Strategies. Custom Kemmer-Criticality-Logic
# wird im pre_call-Hook (scripts/crux-precall-hook.py) implementiert, nicht im Router.
# Fix 2026-04-21: routing_strategy criticality-based-routing → simple-shuffle
router_settings:
  routing_strategy: simple-shuffle
  num_retries: 3
  timeout: 60
  allowed_fails: 3
  cooldown_time: 30

# ========== KEMMER CRITICALITY LOGIC (verwertet von pre_call-Hook, NICHT von LiteLLM) ==========
kemmer_criticality:
  # Criticality-Budgeting (nicht Token-Cap!)
  criticality_scoring:
    K_0_tags: ["capital", "finance", "wegzugssteuer", "trading", "vermoegen", "kpm"]
    K_0_threshold_eur: 50000
    Q_0_tags: ["family", "brueder", "martin-gerdi", "marriage", "familie"]
    phronesis_tags: ["rule-design", "crux-change", "l13", "martin-only", "strategic"]
    irreversible_tags: ["delete", "commit-force", "publish", "push-main"]

  # Premium-Route nur wenn (einer ausreicht):
  #   - K_0 Score >= 50000 EUR
  #   - Q_0 Tag gesetzt
  #   - Phronesis Tag
  #   - Irreversible + Unsicherheit > 0.3
  premium_escalation_rules:
    - if: "criticality_score >= 0.7 OR has_k0 OR has_q0"
      route_to: claude-opus-4.7
    - if: "criticality_score >= 0.4 AND cost_budget > 0"
      route_to: claude-sonnet-4

  # Routine-Route (lokaler Mac wenn verfuegbar, sonst commodity-cloud)
  routine_routing:
    - if: "task_family == 'code-gen' AND criticality < 0.4"
      prefer: [gemma2-27b-local, codex-gpt5.4, copilot-pro]
    - if: "task_family == 'long-context' AND criticality < 0.5"
      prefer: [gemini-2.5-pro, llama3.3-70b-local]
    - if: "task_family == 'adversarial' OR task_family == 'red-team'"
      prefer: [grok-4.20-reasoning, codex-gpt5.4]
    - if: "task_family == 'batch-classification' OR task_family == 'triage'"
      prefer: [gemma2-27b-local, gemini-2.5-pro]

  # Rate-Limit-Handling
  rate_limit_handling:
    strategy: "retry-backoff-then-switch"
    max_retries: 3
    backoff_seconds: [1, 5, 15]
    after_max_retries: "fallback_to_next_in_prefer_list"

  # Cost-Tracking (alle Calls)
  cost_tracking:
    enabled: true
    output_file: "~/.kemmer-grid/cost-log.jsonl"
    alert_threshold_eur_per_hour: 50
    alert_action: "trigger_kill_switch"

  # Fallback-Ketten (bei Modell-Outage)
  fallback_chains:
    claude-opus-4.7: [claude-sonnet-4, gemini-2.5-pro, codex-gpt5.4]
    gemma2-27b-local: [gemini-2.5-pro, copilot-pro]
    grok-4.20-reasoning: [codex-gpt5.4, claude-sonnet-4]

  # Logging fuer Meta-Learning
  meta_logging:
    enabled: true
    log_format: "task-card.json"
    output_dir: "branch-hub/meta-logs/task-cards/"
    fields: ["task_id", "timestamp", "machine", "task_family", "primary_llm", "criticality_score", "latency_ms", "completion_tokens", "cost_eur", "validator_verdict", "martin_edit_distance", "rules_hash", "outcome"]

# ========== SECURITY ==========
security:
  secret_handling: "env-vars-only"
  never_log_api_keys: true
  redact_pii_in_logs: true
  per_machine_rate_limit: true
  shared_account_warning: "Claude-Opus = per-account rate-limited. Mehrere Machines teilen Quota. In Criticality-Routing beruecksichtigt."

# ========== KILL-SWITCH-INTEGRATION ==========
kill_switch:
  file_path: "~/.kemmer-grid/killed.flag"
  check_before_each_call: true
  action_on_flag: "return_503_service_unavailable"

# v2-Compliance-Check: LiteLLM Config ersetzt starren Token-Cap durch Criticality-Budgeting (Copilot-Patch v2).
# Routing beruecksichtigt Account-Rate-Limits (Grok/Copilot/Gemini v2-Finding).
# Fallback-Chains adressieren Provider-Deprecation-Risiko (Gemini-Audit v2-Finding).
